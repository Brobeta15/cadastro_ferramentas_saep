<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Histórico</title>

    <!-- Adicione os links para os arquivos CSS do Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<body>

<!-- Barra de navegação -->
<nav class="navbar navbar-expand-md navbar-dark .navbar.navbar-default.navbar-static-top bg-dark">
    <!-- Logo/marca principal da barra -->
    <a class="navbar-brand mb-0 h1 ms-5 me-5" href="/home">Senai</a>

    <form class="d-flex ms-5 me-5" th:action="@{/logout}" th:method="Post">
        <button class="btn btn btn-outline-light my-2 my-sm-0 justify-content-end" type="submit">Logout</button>
    </form>
</nav>
<!-- Fim barra de navegação -->

<!-- Conteúdo principal -->
<div class="container mt-3">

    <!-- DataTales Example -->
    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Histórico</h6>
        </div>
        <div class="card-body">

            <p class="card-text" style="margin: 0px; display: inline-block; ">
                <a th:href="@{/listaestoque}" class="btn btn-secondary mb-2 me-2">Voltar</a>
            </p>


            <!-- Inicio do HTML da TABELA com os dados -->
            <div class="table-responsive">
                <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                    <!-- Inicio do HTML do título da TABELA -->
                    <thead>
                    <tr>
                        <th>Id</th>
                        <th>Produto</th>
                        <th>Tipo</th>
                        <th>valor</th>
                        <th>Data</th>
                        <th>Responsável</th>
                    </tr>
                    </thead>

                    <!-- Inicio do HTML dos dados TABELA -->
                    <tbody>

                    <!-- Objeto que irá conter uma lista de usuários
                        Essa lista precisa ter os atributos das colunas
                    -->
                    <tr th:each="estoque: ${listahistorico}">

                        <td th:text="${estoque.id}"></td>
                        <td th:text="${estoque.nome}"></td>
                        <td th:text="${estoque.tipo}"></td>
                        <td th:text="${estoque.valor}"></td>
                        <td th:text="${estoque.data}"></td>
                        <td th:text="${estoque.usuario}"></td>
                    </tr>

                    </tbody>
                </table>

                <div>

                    <!--
                   <a th:if="${listaproduto.hasPrevious()}"
                      th:href="@{/listaproduto(pagina=${listaproduto.number - 1})}">
                       Anterior
                   </a>

                   <span th:text="${listaproduto.number + 1}"></span>

                   <a th:if="${listaproduto.hasNext()}"
                      th:href="@{/listaproduto(pagina=${listaproduto.number + 1})}">
                       Próxima
                   </a>

                    -->

                </div>
                <div th:if="${param.erro}" class="alert alert-danger" role="alert">
                    <span class="mensagem">Saída Não permitida: Estoque insuficiente!</span>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Fim conteúdo principal -->
<script src="/js/excluirproduto.js"> </script>
<!-- Rodapé -->
<footer class="container">
    <p>© Turma 2024-2026</p>
</footer>
<!-- Fim Rodapé -->

</body>
</html>
